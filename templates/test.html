{% extends 'base.html' %}

{% block content %}

<div class="container">
  <div class="form-wrap">
    <div class="row">
      <div class="col-md-4">
        <button id="submit" onclick="xhrTest()" class="btn btn-primary btn-block">Create Invoice</button>
      </div>
    </div>
  </div>
  <script>
    function xhrTest() {
      const xhr = new XMLHttpRequest();
      xhr.open("GET", "video", true);
      xhr.onload = (e) => {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            console.log(xhr.responseText);
          } else {
            console.error(xhr.statusText);
          }
        }
      };
      xhr.onerror = (e) => {
        console.error(xhr.statusText);
      };
      xhr.send(null);
    }

  </script>
</div>
{% include 'scripts.html' %}

{% endblock %}
